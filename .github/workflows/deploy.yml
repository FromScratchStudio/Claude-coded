name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build dashboard-artist
        working-directory: dashboard-artist
        run: npm ci && npm run build

      - name: Install & build generic-dashboard
        working-directory: generic-dashboard
        run: npm ci && npm run build

      - name: Install & build generic-comics-publish
        working-directory: generic-comics-publish
        run: npm ci && npm run build
        
      - name: Install & build recherche-immo-dashboard
        working-directory: recherche-immo-dashboard
        run: npm ci && npm run build

      - name: Merge outputs
        run: |
          mkdir -p gh-pages
          cp -r dashboard-artist/dist/. gh-pages/
          mkdir -p gh-pages/generic-dashboard
          cp -r generic-dashboard/dist/. gh-pages/generic-dashboard/
          mkdir -p gh-pages/generic-comics-publish
          cp -r generic-comics-publish/dist/. gh-pages/generic-comics-publish/
          mkdir -p gh-pages/recherche-immo-dashboard
          cp -r recherche-immo-dashboard/dist/. gh-pages/recherche-immo-dashboard/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
